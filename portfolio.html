<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviral Portfolio</title>

<style>
:root{
  --gold:#C9922A;
  --bg:#FDF6EC;
  --dark:#1C1712;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
}

nav{
  padding:1rem;
  display:flex;
  gap:1rem;
  background:#fff;
}

.page{display:none;padding:2rem}
.page.active{display:block}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:1rem;
}

.card{
  border:1px solid #ddd;
  padding:1rem;
  transition:.3s;
}
.card:hover{transform:translateY(-5px);border-color:var(--gold)}

.icon{font-size:2rem}
.btn{padding:.6rem 1rem;background:var(--dark);color:#fff;cursor:pointer}
.bar{height:4px;background:#eee;margin-top:5px}
.fill{height:100%;background:var(--gold);width:0;transition:1s}
</style>
</head>

<body>

<nav>
  <button onclick="navPage('home')">Home</button>
  <button onclick="navPage('skills')">Skills</button>
  <button onclick="navPage('work')">Work</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Aviral Chaudhary</h1>
  <p>Full Stack Developer & AI Developer</p>
</div>

<!-- SKILLS -->
<div id="skills" class="page">
  <h2>Skills</h2>
  <div id="skillsGrid" class="grid"></div>
</div>

<!-- WORK -->
<div id="work" class="page">
  <h2>Projects</h2>
  <div id="projectsGrid" class="grid"></div>
</div>

<script>

// ─────────────────────────────
// DATA
// ─────────────────────────────
const DATA = {
  skills:[
    {cat:'Frontend',icon:'⚛️',items:[{n:'React',l:90},{n:'CSS',l:85}]},
    {cat:'Backend',icon:'🛠️',items:[{n:'Node',l:88},{n:'API',l:80}]}
  ],
  projects:[
    {id:'1',title:'AI SaaS',desc:'AI platform',icon:'🤖'},
    {id:'2',title:'Ecommerce',desc:'Store app',icon:'🛒'}
  ]
};

// ─────────────────────────────
// GENERIC RENDER
// ─────────────────────────────
function render(id, data, component){
  document.getElementById(id).innerHTML =
    data.map(component).join('');
}

// ─────────────────────────────
// COMPONENTS
// ─────────────────────────────

const SkillItem = i => `
  <div>
    ${i.n} (${i.l}%)
    <div class="bar"><div class="fill" data-w="${i.l}"></div></div>
  </div>
`;

const SkillCard = s => `
  <div class="card">
    <div class="icon">${s.icon}</div>
    <h3>${s.cat}</h3>
    ${s.items.map(SkillItem).join('')}
  </div>
`;

const ProjectCard = p => `
  <div class="card">
    <div class="icon">${p.icon}</div>
    <h3>${p.title}</h3>
    <p>${p.desc}</p>
  </div>
`;

// ─────────────────────────────
// RENDER FUNCTIONS
// ─────────────────────────────
function loadSkills(){
  render('skillsGrid', DATA.skills, SkillCard);
}

function loadProjects(){
  render('projectsGrid', DATA.projects, ProjectCard);
}

// ─────────────────────────────
// NAVIGATION
// ─────────────────────────────
function navPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page==='skills') loadSkills();
  if(page==='work') loadProjects();
}

// ─────────────────────────────
// ANIMATION (Skill Bars)
// ─────────────────────────────
function animateBars(){
  document.querySelectorAll('.fill').forEach(el=>{
    setTimeout(()=>{
      el.style.width = el.dataset.w + '%';
    },200);
  });
}

// trigger animation after render
document.addEventListener('click',()=>{
  setTimeout(animateBars,100);
});

</script>

</body>
</html>
